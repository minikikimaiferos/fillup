<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#06060f"/>

  <!-- Small eye (o) -->
  <circle cx="20" cy="34" r="10" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <circle cx="20" cy="38" r="3.5" fill="#ffffff"/>

  <!-- Big eye (O) -->
  <circle cx="44" cy="30" r="13" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
  <circle cx="44" cy="35" r="4.5" fill="url(#pupilGrad)"/>

  <!-- Underscore between eyes -->
  <rect x="29" y="44" width="6" height="2.5" rx="1" fill="#ffffff" opacity="0.5"/>

  <defs>
    <linearGradient id="pupilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
</svg>
